services:
  - type: web
    name: ramanujan-laboratory
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /_stcore/health
    envVars:
      - key: RAMANUJAN_PUBLIC_WEB
        value: "1"
      - key: RAMANUJAN_CACHE_DIR
        value: /tmp/ramanujan_lab_cache
      - key: RAMANUJAN_DATA_DIR
        value: /tmp/ramanujan_lab_data

  - type: web
    name: ramanujan-laboratory-api
    runtime: docker
    plan: free
    dockerCommand: uvicorn api_service:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
